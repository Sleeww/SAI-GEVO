<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SAI GEVO | Interaktivní časová osa</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #182026;
      --muted: #5f6f78;
      --line: #d8e1df;
      --paper: #f7f8f5;
      --paper-deep: #edf2ef;
      --panel: #ffffff;
      --green: #0e7a5f;
      --blue: #1f5f9f;
      --gold: #c58a16;
      --danger: #b63f4c;
      --field: #fbfcfa;
      --focus-field: #ffffff;
      --empty-bg: #fff7d8;
      --empty-border: #ead58b;
      --empty-ink: #8b6b10;
      --export-ink: #2d383f;
      --button-ink: #ffffff;
      --shadow: 0 18px 44px rgba(24, 32, 38, 0.12);
      --axis-x: 120px;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --ink: #edf3f0;
      --muted: #a9b8b3;
      --line: #33443f;
      --paper: #101615;
      --paper-deep: #0d1312;
      --panel: #17201e;
      --green: #72d3b2;
      --blue: #80b7ef;
      --gold: #e2b75d;
      --danger: #e06b78;
      --field: #1d2825;
      --focus-field: #22322e;
      --empty-bg: #403819;
      --empty-border: #806d24;
      --empty-ink: #f1d984;
      --export-ink: #d9e5e0;
      --button-ink: #111817;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.38);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: linear-gradient(180deg, var(--paper) 0, var(--paper-deep) 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header,
    main {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
    }

    header { padding: 28px 0 20px; }

    a {
      color: var(--green);
      font-weight: 800;
      text-decoration: none;
    }

    h1 {
      margin: 18px 0 8px;
      font-size: clamp(2.4rem, 5vw, 4.8rem);
      line-height: 0.96;
      letter-spacing: 0;
    }

    header p {
      max-width: 760px;
      color: var(--muted);
      line-height: 1.6;
      font-weight: 550;
    }

    .toolbar,
    .timeline,
    .export-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      padding: 14px;
      border-top: 5px solid var(--green);
    }

    .toolbar-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      min-height: 40px;
      border: 0;
      border-radius: 6px;
      padding: 0 14px;
      color: var(--button-ink);
      background: var(--ink);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .secondary {
      color: var(--ink);
      border: 1px solid var(--line);
      background: var(--panel);
    }

    .theme-toggle {
      width: 40px;
      min-height: 40px;
      padding: 0;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    .theme-icon {
      display: block;
      width: 16px;
      height: 16px;
      margin: 0 auto;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 7px -5px 0 -2px var(--panel);
    }

    [data-theme="dark"] .theme-icon {
      background: var(--blue);
      box-shadow: 7px -5px 0 -2px var(--panel);
    }

    .timeline {
      min-height: 520px;
      padding: 24px;
      border-top: 5px solid var(--blue);
      box-shadow: var(--shadow);
    }

    .timeline-heading {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
    }

    .timeline-heading h2 {
      margin: 0 0 6px;
      font-size: clamp(1.4rem, 3vw, 2.4rem);
    }

    .timeline-heading p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .badge {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 8px 12px;
      color: #fff;
      background: var(--blue);
      font-weight: 800;
      font-size: 0.86rem;
    }

    .timeline-events {
      position: relative;
    }

    .timeline-events::before {
      content: "";
      position: absolute;
      left: var(--axis-x);
      top: 0;
      bottom: 14px;
      width: 3px;
      border-radius: 999px;
      background: var(--line);
    }

    .event {
      display: grid;
      grid-template-columns: 100px 1fr 44px;
      gap: 38px;
      padding: 0 0 14px;
      position: relative;
    }

    .year-field {
      align-self: center;
      font-weight: 900;
      color: var(--blue);
    }

    .year-wrap {
      align-self: center;
    }

    .event-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: var(--field);
      position: relative;
    }

    .event-card::before {
      content: "";
      position: absolute;
      left: -28px;
      top: 50%;
      width: 14px;
      height: 14px;
      border: 3px solid var(--panel);
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 0 2px var(--gold);
      transform: translateY(-50%);
      z-index: 1;
    }

    .field-wrap {
      position: relative;
    }

    .field-wrap + .field-wrap {
      margin-top: 8px;
    }

    .edit-hint {
      position: absolute;
      right: 8px;
      top: 8px;
      color: var(--muted);
      pointer-events: none;
      font-size: 0.9rem;
      opacity: 0.72;
    }

    .editable {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 7px 8px;
      color: var(--ink);
      background: transparent;
      font: inherit;
    }

    .editable:focus {
      border-color: var(--blue);
      outline: 3px solid rgba(31, 95, 159, 0.14);
      background: var(--focus-field);
    }

    .event-title {
      margin-bottom: 8px;
      font-size: 1.08rem;
      font-weight: 900;
      padding-right: 30px;
    }

    .event-note {
      min-height: 72px;
      overflow: hidden;
      color: var(--muted);
      line-height: 1.5;
      resize: none;
      padding-right: 30px;
    }

    .event-meta {
      margin-top: 10px;
      color: var(--green);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .empty-field {
      color: var(--empty-ink);
      background: var(--empty-bg);
      border-color: var(--empty-border);
    }

    .event-actions {
      align-self: center;
      display: grid;
      gap: 8px;
    }

    .icon-button,
    .insert-button {
      width: 40px;
      min-height: 40px;
      padding: 0;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 1.25rem;
      line-height: 1;
    }

    .delete-button { background: var(--danger); }

    .insert-row {
      display: grid;
      grid-template-columns: 100px 1fr 44px;
      gap: 38px;
      padding: 0 0 14px;
    }

    .insert-button {
      grid-column: 2;
      justify-self: start;
      color: var(--ink);
      border: 1px dashed var(--line);
      background: var(--panel);
    }

    .export-box {
      margin: 18px 0 32px;
      padding: 18px;
      border-top: 5px solid var(--gold);
    }

    pre {
      overflow-x: auto;
      overflow-y: hidden;
      white-space: pre-wrap;
      line-height: 1.45;
      height: 5.8em;
      margin: 12px 0 0;
      color: var(--export-ink);
    }

    @media (max-width: 760px) {
      .toolbar,
      .timeline-heading {
        align-items: flex-start;
        flex-direction: column;
      }

      .event,
      .insert-row {
        --axis-x: 88px;
        grid-template-columns: 70px 1fr 44px;
        gap: 36px;
      }
    }

    @media (max-width: 560px) {
      .timeline { padding: 16px; }

      .event { grid-template-columns: 1fr 44px; }

      .year-wrap { grid-column: 1 / -1; }

      .timeline-events::before,
      .event-card::before { display: none; }

      .insert-row {
        display: flex;
        padding-left: 0;
      }
    }
  </style>
</head>
<body>
  <header>
    <a href="../../Landing page/Knihovna nastroju/index.html">← Knihovna nástrojů</a>
    <h1>Interaktivní časová osa</h1>
    <p>Upravuj roky, názvy a popisy přímo v časové ose. Tlačítka plus vkládají novou událost mezi existující body.</p>
  </header>

  <main>
    <section class="toolbar" aria-label="Ovládání časové osy">
      <div class="toolbar-group">
        <button class="secondary" type="button" id="undo-button">Zpět</button>
        <button class="secondary" type="button" id="redo-button">Znovu</button>
      </div>
      <div class="toolbar-group">
        <button class="secondary theme-toggle" type="button" id="theme-toggle" aria-label="Přepnout tmavý režim" aria-pressed="false"><span class="theme-icon" aria-hidden="true"></span></button>
        <button class="secondary" type="button" id="reset-fields">Obnovit časovou osu</button>
      </div>
    </section>

    <section class="timeline" id="timeline" aria-label="Časová osa"></section>

    <section class="export-box" aria-labelledby="export-title">
      <h2 id="export-title">Export vyplněných poznámek</h2>
      <button type="button" id="copy-export">Zkopírovat text</button>
      <pre id="export-text"></pre>
    </section>
  </main>

  <script>
    const timelines = [
      {
        id: "samet",
        title: "Sametová revoluce a bezprostřední následky",
        category: "Sametová revoluce",
        period: "1988-1993",
        description: "Události vedoucí k pádu komunistického režimu a první kroky nového politického uspořádání.",
        events: [
          { year: "1988", title: "Palachův týden", note: "Protirežimní demonstrace v Praze. Doplň, proč byl odkaz Jana Palacha důležitý.", category: "Sametová revoluce" },
          { year: "17. 11. 1989", title: "Studentská demonstrace", note: "", category: "Sametová revoluce" },
          { year: "19. 11. 1989", title: "", note: "Vzniká politická iniciativa, která vyjednává s představiteli režimu.", category: "Sametová revoluce" },
          { year: "27. 11. 1989", title: "Generální stávka", note: "Doplň, co stávka ukázala o podpoře změn ve společnosti.", category: "Sametová revoluce" },
          { year: "29. 12. 1989", title: "Václav Havel prezidentem", note: "", category: "Bezprostřední následky" },
          { year: "1990", title: "První svobodné volby", note: "Doplň, jak se změnil politický systém.", category: "Bezprostřední následky" },
          { year: "1993", title: "Vznik České republiky", note: "Krátce vysvětli souvislost s rozpadem federace.", category: "Bezprostřední následky" }
        ]
      },
      {
        id: "ww1",
        title: "Jak začala první světová válka",
        category: "WW1",
        period: "1879-1914",
        description: "Dlouhodobé napětí, alianční systém a červencová krize.",
        events: [
          { year: "1879", title: "Dvojspolek", note: "Německo a Rakousko-Uhersko uzavírají spojeneckou smlouvu.", category: "WW1" },
          { year: "1908", title: "Anexe Bosny a Hercegoviny", note: "", category: "WW1" },
          { year: "1912-1913", title: "Balkánské války", note: "Doplň, proč Balkán zvyšoval napětí mezi velmocemi.", category: "WW1" },
          { year: "28. 6. 1914", title: "", note: "V Sarajevu je spáchán atentát na následníka trůnu.", category: "WW1" },
          { year: "23. 7. 1914", title: "Ultimátum Srbsku", note: "Doplň, proč bylo ultimátum pro Srbsko těžko přijatelné.", category: "WW1" },
          { year: "28. 7. 1914", title: "Rakousko-Uhersko vyhlašuje válku Srbsku", note: "", category: "WW1" },
          { year: "srpen 1914", title: "Válka se rozšiřuje", note: "Doplň, jak alianční závazky změnily lokální konflikt ve světovou válku.", category: "WW1" }
        ]
      },
      {
        id: "husite",
        title: "Husitské války",
        category: "Husitství",
        period: "1402-1436",
        description: "Od reformní kritiky církve přes defenestraci po basilejská kompaktáta.",
        events: [
          { year: "1402", title: "Jan Hus káže v Betlémské kapli", note: "Doplň hlavní body Husovy kritiky církve.", category: "Husitství" },
          { year: "1415", title: "", note: "Jan Hus je v Kostnici odsouzen a upálen.", category: "Husitství" },
          { year: "1419", title: "První pražská defenestrace", note: "", category: "Husitství" },
          { year: "1420", title: "Bitva na Vítkově", note: "Doplň, proč byla obrana Prahy důležitá.", category: "Husitství" },
          { year: "1434", title: "Bitva u Lipan", note: "Radikální husité jsou poraženi koalicí umírněných husitů a katolíků.", category: "Husitství" },
          { year: "1436", title: "Basilejská kompaktáta", note: "", category: "Husitství" }
        ]
      },
      {
        id: "ww2",
        title: "Cesta ke druhé světové válce",
        category: "WW2",
        period: "1919-1939",
        description: "Vybrané meziválečné události, které přispěly k vypuknutí války.",
        events: [
          { year: "1919", title: "Versailleská smlouva", note: "Doplň, jak smlouva ovlivnila Německo.", category: "WW2" },
          { year: "1933", title: "", note: "Adolf Hitler se stává německým kancléřem.", category: "WW2" },
          { year: "1936", title: "Remilitarizace Porýní", note: "", category: "WW2" },
          { year: "1938", title: "Mnichovská dohoda", note: "Doplň důsledek pro Československo.", category: "WW2" },
          { year: "15. 3. 1939", title: "Okupace českých zemí", note: "", category: "WW2" },
          { year: "1. 9. 1939", title: "Napadení Polska", note: "Doplň, proč tato událost znamenala začátek války v Evropě.", category: "WW2" }
        ]
      }
    ];

    const params = new URLSearchParams(window.location.search);
    const timelineId = params.get("timeline") || timelines[0].id;
    const selectedTimeline = timelines.find((item) => item.id === timelineId) || timelines[0];
    const timeline = document.querySelector("#timeline");
    const exportText = document.querySelector("#export-text");
    const copyButton = document.querySelector("#copy-export");
    const resetButton = document.querySelector("#reset-fields");
    const undoButton = document.querySelector("#undo-button");
    const redoButton = document.querySelector("#redo-button");
    const themeToggle = document.querySelector("#theme-toggle");

    let workingEvents = cloneEvents(selectedTimeline.events);
    let undoStack = [];
    let redoStack = [];

    const storedTheme = localStorage.getItem("sai-theme");
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    setTheme(storedTheme || (prefersDark ? "dark" : "light"));

    function cloneEvents(events) {
      return events.map((event) => ({ ...event }));
    }

    function snapshot() {
      return cloneEvents(workingEvents);
    }

    function restore(events) {
      workingEvents = cloneEvents(events);
      render();
    }

    function recordHistory() {
      undoStack.push(snapshot());
      redoStack = [];
      updateHistoryButtons();
    }

    function yearNumber(value) {
      const match = String(value).match(/\d{3,4}/);
      return match ? Number(match[0]) : Number.NaN;
    }

    function sortedEventsWithIndex() {
      return workingEvents
        .map((event, index) => ({ event, index }))
        .sort((a, b) => {
          const aYear = yearNumber(a.event.year);
          const bYear = yearNumber(b.event.year);
          if (Number.isNaN(aYear) && Number.isNaN(bYear)) return a.index - b.index;
          if (Number.isNaN(aYear)) return 1;
          if (Number.isNaN(bYear)) return -1;
          return aYear - bYear || a.index - b.index;
        });
    }

    function render() {
      const ordered = sortedEventsWithIndex();
      timeline.innerHTML = "";

      const heading = document.createElement("div");
      heading.className = "timeline-heading";
      heading.innerHTML = `
        <div>
          <h2>${selectedTimeline.title}</h2>
          <p>${selectedTimeline.description}</p>
        </div>
        <span class="badge">${selectedTimeline.period}</span>
      `;
      timeline.append(heading);

      const eventList = document.createElement("div");
      eventList.className = "timeline-events";
      ordered.forEach(({ event, index }, orderedIndex) => {
        eventList.append(createEventElement(event, index));
        if (orderedIndex < ordered.length - 1) eventList.append(createInsertRow(index + 1));
      });
      timeline.append(eventList);

      renderExport();
      updateHistoryButtons();
    }

    function createEventElement(event, index) {
      const item = document.createElement("article");
      item.className = "event";

      const yearInput = document.createElement("input");
      yearInput.className = `year-field editable ${event.year ? "" : "empty-field"}`;
      yearInput.value = event.year;
      yearInput.setAttribute("aria-label", "Rok události");
      yearInput.addEventListener("focus", recordHistoryOnce);
      yearInput.addEventListener("input", (inputEvent) => updateEvent(index, "year", inputEvent.target.value));

      const card = document.createElement("div");
      card.className = "event-card";

      const titleInput = document.createElement("input");
      titleInput.className = `event-title editable ${event.title ? "" : "empty-field"}`;
      titleInput.value = event.title;
      titleInput.placeholder = "Doplň název události";
      titleInput.setAttribute("aria-label", "Název události");
      titleInput.addEventListener("focus", recordHistoryOnce);
      titleInput.addEventListener("input", (inputEvent) => updateEvent(index, "title", inputEvent.target.value));

      const noteInput = document.createElement("textarea");
      noteInput.className = `event-note editable ${event.note ? "" : "empty-field"}`;
      noteInput.value = event.note;
      noteInput.placeholder = "Doplň vysvětlení";
      noteInput.setAttribute("aria-label", "Popis události");
      noteInput.addEventListener("focus", recordHistoryOnce);
      noteInput.addEventListener("input", (inputEvent) => {
        updateEvent(index, "note", inputEvent.target.value);
        autoResize(noteInput);
      });
      requestAnimationFrame(() => autoResize(noteInput));

      const meta = document.createElement("div");
      meta.className = "event-meta";
      meta.textContent = event.category;

      const actions = document.createElement("div");
      actions.className = "event-actions";

      const deleteButton = document.createElement("button");
      deleteButton.className = "icon-button delete-button";
      deleteButton.type = "button";
      deleteButton.textContent = "-";
      deleteButton.setAttribute("aria-label", "Odstranit událost");
      deleteButton.addEventListener("click", () => deleteEvent(index));
      actions.append(deleteButton);

      card.append(wrapEditable(titleInput), wrapEditable(noteInput), meta);
      const yearWrap = wrapEditable(yearInput);
      yearWrap.classList.add("year-wrap");

      item.append(yearWrap, card, actions);
      return item;
    }

    function wrapEditable(field) {
      const wrapper = document.createElement("div");
      wrapper.className = "field-wrap";
      const hint = document.createElement("span");
      hint.className = "edit-hint";
      hint.textContent = "✎";
      wrapper.append(field, hint);
      return wrapper;
    }

    function autoResize(textarea) {
      textarea.style.height = "auto";
      textarea.style.height = `${textarea.scrollHeight}px`;
    }

    function createInsertRow(insertIndex) {
      const row = document.createElement("div");
      row.className = "insert-row";

      const button = document.createElement("button");
      button.className = "insert-button";
      button.type = "button";
      button.textContent = "+";
      button.setAttribute("aria-label", "Vložit novou událost");
      button.addEventListener("click", () => insertEvent(insertIndex));
      row.append(button);
      return row;
    }

    function recordHistoryOnce(event) {
      if (event.target.dataset.historyOpen === "true") return;
      event.target.dataset.historyOpen = "true";
      recordHistory();
      event.target.addEventListener("blur", () => {
        event.target.dataset.historyOpen = "false";
      }, { once: true });
    }

    function updateEvent(index, key, value) {
      workingEvents[index][key] = value;
      renderExport();
    }

    function insertEvent(index) {
      recordHistory();
      workingEvents.splice(index, 0, {
        year: "",
        title: "",
        note: "",
        category: selectedTimeline.category
      });
      render();
    }

    function deleteEvent(index) {
      recordHistory();
      workingEvents.splice(index, 1);
      render();
    }

    function undo() {
      if (undoStack.length === 0) return;
      redoStack.push(snapshot());
      restore(undoStack.pop());
    }

    function redo() {
      if (redoStack.length === 0) return;
      undoStack.push(snapshot());
      restore(redoStack.pop());
    }

    function updateHistoryButtons() {
      undoButton.disabled = undoStack.length === 0;
      redoButton.disabled = redoStack.length === 0;
    }

    function setTheme(theme) {
      document.documentElement.dataset.theme = theme;
      localStorage.setItem("sai-theme", theme);
      themeToggle?.setAttribute("aria-pressed", String(theme === "dark"));
    }

    function renderExport() {
      exportText.textContent = sortedEventsWithIndex()
        .map(({ event }) => `${event.year || "[rok]"} - ${event.title || "[událost]"}: ${event.note || "[vysvětlení]"} (${event.category})`)
        .join("\n");
    }

    function resetTimeline() {
      recordHistory();
      workingEvents = cloneEvents(selectedTimeline.events);
      render();
    }

    undoButton.addEventListener("click", undo);
    redoButton.addEventListener("click", redo);
    resetButton.addEventListener("click", resetTimeline);
    themeToggle.addEventListener("click", () => {
      const nextTheme = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
      setTheme(nextTheme);
    });

    copyButton.addEventListener("click", async () => {
      await navigator.clipboard.writeText(exportText.textContent);
      copyButton.textContent = "Zkopírováno";
      setTimeout(() => {
        copyButton.textContent = "Zkopírovat text";
      }, 1200);
    });

    render();
