<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SAI GEVO | Interaktivní časová osa</title>
  <style>
    :root {
      --ink: #182026;
      --muted: #5f6f78;
      --line: #d8e0e6;
      --paper: #f7f8f5;
      --panel: #ffffff;
      --green: #0f7a5f;
      --blue: #1f5f9f;
      --gold: #c58a16;
      --rose: #b44b61;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header,
    main {
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
    }

    header {
      padding: 28px 0 20px;
    }

    a {
      color: var(--green);
      font-weight: 800;
      text-decoration: none;
    }

    h1 {
      margin: 18px 0 8px;
      font-size: clamp(2rem, 5vw, 4.2rem);
      letter-spacing: 0;
    }

    header p {
      max-width: 760px;
      color: var(--muted);
      line-height: 1.6;
    }

    .workspace {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 18px;
      padding-bottom: 32px;
    }

    .panel,
    .timeline,
    .export-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .panel {
      padding: 18px;
      align-self: start;
      position: sticky;
      top: 16px;
    }

    label {
      display: block;
      margin: 14px 0 7px;
      font-weight: 800;
    }

    select,
    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--ink);
      background: #fff;
      font: inherit;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    .range-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 6px;
      padding: 0 14px;
      color: #fff;
      background: var(--ink);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .secondary {
      color: var(--ink);
      border: 1px solid var(--line);
      background: #fff;
    }

    .panel-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .timeline {
      min-height: 520px;
      padding: 24px;
    }

    .timeline-heading {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
    }

    .timeline-heading h2 {
      margin: 0 0 6px;
      font-size: clamp(1.4rem, 3vw, 2.4rem);
    }

    .timeline-heading p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .badge {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 8px 12px;
      color: #fff;
      background: var(--blue);
      font-weight: 800;
      font-size: 0.86rem;
    }

    .event {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 18px;
      padding: 0 0 24px;
      position: relative;
    }

    .event::before {
      content: "";
      position: absolute;
      left: 133px;
      top: 14px;
      bottom: -12px;
      width: 3px;
      background: var(--line);
    }

    .event:last-child::before {
      display: none;
    }

    .year-field {
      font-weight: 900;
      color: var(--blue);
    }

    .event-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fbfcfa;
      position: relative;
    }

    .event-card::before {
      content: "";
      position: absolute;
      left: -29px;
      top: 14px;
      width: 14px;
      height: 14px;
      border: 3px solid #fff;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 0 2px var(--gold);
    }

    .editable {
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 7px 8px;
      background: transparent;
    }

    .editable:focus {
      border-color: var(--blue);
      outline: 3px solid rgba(31, 95, 159, 0.14);
      background: #fff;
    }

    .event-title {
      margin-bottom: 8px;
      font-size: 1.08rem;
      font-weight: 900;
    }

    .event-note {
      color: var(--muted);
      line-height: 1.5;
      min-height: 44px;
    }

    .event-meta {
      margin-top: 10px;
      color: var(--green);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .empty-field {
      color: #8b6b10;
      background: #fff7d8;
      border-color: #ead58b;
    }

    .export-box {
      grid-column: 1 / -1;
      padding: 18px;
    }

    pre {
      overflow-x: auto;
      white-space: pre-wrap;
      margin: 12px 0 0;
      color: #2d383f;
    }

    @media (max-width: 860px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .panel {
        position: static;
      }

      .event {
        grid-template-columns: 86px 1fr;
      }

      .event::before {
        left: 99px;
      }
    }

    @media (max-width: 600px) {
      .timeline {
        padding: 16px;
      }

      .timeline-heading {
        align-items: flex-start;
        flex-direction: column;
      }

      .event {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .event::before,
      .event-card::before {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <a href="../../Landing page/Knihovna nastroju/index.html">← Knihovna nástrojů</a>
    <h1>Interaktivní časová osa</h1>
    <p>Vyber téma a doplň nebo uprav údaje přímo v časové ose. Některá pole jsou záměrně prázdná nebo obecná.</p>
  </header>

  <main class="workspace">
    <aside class="panel" aria-label="Filtry časové osy">
      <label for="timeline-select">Téma</label>
      <select id="timeline-select"></select>

      <label for="category-select">Kategorie</label>
      <select id="category-select">
        <option value="all">Všechny kategorie</option>
      </select>

      <div class="range-grid">
        <div>
          <label for="year-from">Od roku</label>
          <input id="year-from" type="number" inputmode="numeric">
        </div>
        <div>
          <label for="year-to">Do roku</label>
          <input id="year-to" type="number" inputmode="numeric">
        </div>
      </div>

      <div class="panel-actions">
        <button class="secondary" type="button" id="reset-fields">Obnovit téma</button>
      </div>
    </aside>

    <section class="timeline" id="timeline" aria-label="Časová osa"></section>

    <section class="export-box" aria-labelledby="export-title">
      <h2 id="export-title">Export vyplněných poznámek</h2>
      <button type="button" id="copy-export">Zkopírovat text</button>
      <pre id="export-text"></pre>
    </section>
  </main>

  <script>
    const timelines = [
      {
        id: "samet",
        title: "Sametová revoluce a bezprostřední následky",
        category: "Sametová revoluce",
        period: "1988-1993",
        description: "Události vedoucí k pádu komunistického režimu a první kroky nového politického uspořádání.",
        events: [
          { year: "1988", title: "Palachův týden", note: "Protirežimní demonstrace v Praze. Doplň, proč byl odkaz Jana Palacha důležitý.", category: "Sametová revoluce" },
          { year: "17. 11. 1989", title: "Studentská demonstrace", note: "", category: "Sametová revoluce" },
          { year: "19. 11. 1989", title: "", note: "Vzniká politická iniciativa, která vyjednává s představiteli režimu.", category: "Sametová revoluce" },
          { year: "27. 11. 1989", title: "Generální stávka", note: "Doplň, co stávka ukázala o podpoře změn ve společnosti.", category: "Sametová revoluce" },
          { year: "29. 12. 1989", title: "Václav Havel prezidentem", note: "", category: "Bezprostřední následky" },
          { year: "1990", title: "První svobodné volby", note: "Doplň, jak se změnil politický systém.", category: "Bezprostřední následky" },
          { year: "1993", title: "Vznik České republiky", note: "Krátce vysvětli souvislost s rozpadem federace.", category: "Bezprostřední následky" }
        ]
      },
      {
        id: "ww1",
        title: "Jak začala první světová válka",
        category: "WW1",
        period: "1879-1914",
        description: "Dlouhodobé napětí, alianční systém a červencová krize.",
        events: [
          { year: "1879", title: "Dvojspolek", note: "Německo a Rakousko-Uhersko uzavírají spojeneckou smlouvu.", category: "WW1" },
          { year: "1908", title: "Anexe Bosny a Hercegoviny", note: "", category: "WW1" },
          { year: "1912-1913", title: "Balkánské války", note: "Doplň, proč Balkán zvyšoval napětí mezi velmocemi.", category: "WW1" },
          { year: "28. 6. 1914", title: "", note: "V Sarajevu je spáchán atentát na následníka trůnu.", category: "WW1" },
          { year: "23. 7. 1914", title: "Ultimátum Srbsku", note: "Doplň, proč bylo ultimátum pro Srbsko těžko přijatelné.", category: "WW1" },
          { year: "28. 7. 1914", title: "Rakousko-Uhersko vyhlašuje válku Srbsku", note: "", category: "WW1" },
          { year: "srpen 1914", title: "Válka se rozšiřuje", note: "Doplň, jak alianční závazky změnily lokální konflikt ve světovou válku.", category: "WW1" }
        ]
      },
      {
        id: "husite",
        title: "Husitské války",
        category: "Husitství",
        period: "1402-1436",
        description: "Od reformní kritiky církve přes defenestraci po basilejská kompaktáta.",
        events: [
          { year: "1402", title: "Jan Hus káže v Betlémské kapli", note: "Doplň hlavní body Husovy kritiky církve.", category: "Husitství" },
          { year: "1415", title: "", note: "Jan Hus je v Kostnici odsouzen a upálen.", category: "Husitství" },
          { year: "1419", title: "První pražská defenestrace", note: "", category: "Husitství" },
          { year: "1420", title: "Bitva na Vítkově", note: "Doplň, proč byla obrana Prahy důležitá.", category: "Husitství" },
          { year: "1434", title: "Bitva u Lipan", note: "Radikální husité jsou poraženi koalicí umírněných husitů a katolíků.", category: "Husitství" },
          { year: "1436", title: "Basilejská kompaktáta", note: "", category: "Husitství" }
        ]
      },
      {
        id: "ww2",
        title: "Cesta ke druhé světové válce",
        category: "WW2",
        period: "1919-1939",
        description: "Vybrané meziválečné události, které přispěly k vypuknutí války.",
        events: [
          { year: "1919", title: "Versailleská smlouva", note: "Doplň, jak smlouva ovlivnila Německo.", category: "WW2" },
          { year: "1933", title: "", note: "Adolf Hitler se stává německým kancléřem.", category: "WW2" },
          { year: "1936", title: "Remilitarizace Porýní", note: "", category: "WW2" },
          { year: "1938", title: "Mnichovská dohoda", note: "Doplň důsledek pro Československo.", category: "WW2" },
          { year: "15. 3. 1939", title: "Okupace českých zemí", note: "", category: "WW2" },
          { year: "1. 9. 1939", title: "Napadení Polska", note: "Doplň, proč tato událost znamenala začátek války v Evropě.", category: "WW2" }
        ]
      }
    ];

    const timelineSelect = document.querySelector("#timeline-select");
    const categorySelect = document.querySelector("#category-select");
    const yearFrom = document.querySelector("#year-from");
    const yearTo = document.querySelector("#year-to");
    const timeline = document.querySelector("#timeline");
    const exportText = document.querySelector("#export-text");
    const copyButton = document.querySelector("#copy-export");
    const resetButton = document.querySelector("#reset-fields");

    let activeTimelineId = timelines[0].id;
    let workingEvents = cloneEvents(timelines[0].events);

    function cloneEvents(events) {
      return events.map((event) => ({ ...event }));
    }

    function yearNumber(value) {
      const match = String(value).match(/\d{3,4}/);
      return match ? Number(match[0]) : Number.NaN;
    }

    function populateSelects() {
      timelines.forEach((item) => {
        const option = document.createElement("option");
        option.value = item.id;
        option.textContent = item.title;
        timelineSelect.append(option);
      });

      const categories = [...new Set(timelines.flatMap((item) => item.events.map((event) => event.category)))].sort((a, b) => a.localeCompare(b, "cs"));
      categories.forEach((category) => {
        const option = document.createElement("option");
        option.value = category;
        option.textContent = category;
        categorySelect.append(option);
      });
    }

    function activeTimeline() {
      return timelines.find((item) => item.id === activeTimelineId);
    }

    function filteredEvents() {
      const from = yearFrom.value ? Number(yearFrom.value) : -Infinity;
      const to = yearTo.value ? Number(yearTo.value) : Infinity;
      const category = categorySelect.value;

      return workingEvents.filter((event) => {
        const numericYear = yearNumber(event.year);
        const matchesYear = Number.isNaN(numericYear) || (numericYear >= from && numericYear <= to);
        const matchesCategory = category === "all" || event.category === category;
        return matchesYear && matchesCategory;
      });
    }

    function render() {
      const selected = activeTimeline();
      const events = filteredEvents().sort((a, b) => yearNumber(a.year) - yearNumber(b.year));

      timeline.innerHTML = `
        <div class="timeline-heading">
          <div>
            <h2>${selected.title}</h2>
            <p>${selected.description}</p>
          </div>
          <span class="badge">${selected.period}</span>
        </div>
      `;

      events.forEach((event) => {
        const index = workingEvents.indexOf(event);
        const item = document.createElement("article");
        item.className = "event";

        const yearInput = document.createElement("input");
        yearInput.className = `year-field editable ${event.year ? "" : "empty-field"}`;
        yearInput.value = event.year;
        yearInput.setAttribute("aria-label", "Rok události");
        yearInput.addEventListener("input", (inputEvent) => updateEvent(index, "year", inputEvent.target.value));

        const card = document.createElement("div");
        card.className = "event-card";

        const titleInput = document.createElement("input");
        titleInput.className = `event-title editable ${event.title ? "" : "empty-field"}`;
        titleInput.value = event.title;
        titleInput.placeholder = "Doplň název události";
        titleInput.setAttribute("aria-label", "Název události");
        titleInput.addEventListener("input", (inputEvent) => updateEvent(index, "title", inputEvent.target.value));

        const noteInput = document.createElement("textarea");
        noteInput.className = `event-note editable ${event.note ? "" : "empty-field"}`;
        noteInput.value = event.note;
        noteInput.placeholder = "Doplň vysvětlení";
        noteInput.setAttribute("aria-label", "Popis události");
        noteInput.addEventListener("input", (inputEvent) => updateEvent(index, "note", inputEvent.target.value));

        const meta = document.createElement("div");
        meta.className = "event-meta";
        meta.textContent = event.category;

        card.append(titleInput, noteInput, meta);
        item.append(yearInput, card);
        timeline.append(item);
      });

      if (events.length === 0) {
        const empty = document.createElement("p");
        empty.textContent = "Pro zadaný filtr nejsou v této časové ose žádné události.";
        timeline.append(empty);
      }

      renderExport();
    }

    function updateEvent(index, key, value) {
      workingEvents[index][key] = value;
      renderExport();
    }

    function renderExport() {
      exportText.textContent = workingEvents
        .map((event) => `${event.year || "[rok]"} - ${event.title || "[událost]"}: ${event.note || "[vysvětlení]"} (${event.category})`)
        .join("\n");
    }

    function resetTimeline() {
      workingEvents = cloneEvents(activeTimeline().events);
      render();
    }

    timelineSelect.addEventListener("change", () => {
      activeTimelineId = timelineSelect.value;
      resetTimeline();
    });

    categorySelect.addEventListener("change", render);
    yearFrom.addEventListener("input", render);
    yearTo.addEventListener("input", render);
    resetButton.addEventListener("click", resetTimeline);

    copyButton.addEventListener("click", async () => {
      await navigator.clipboard.writeText(exportText.textContent);
      copyButton.textContent = "Zkopírováno";
      setTimeout(() => {
        copyButton.textContent = "Zkopírovat text";
      }, 1200);
    });

    populateSelects();
    render();
  </script>
</body>
</html>
