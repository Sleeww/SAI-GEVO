<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SAI GEVO | Knihovna nástrojů</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="classroom-header">
    <a class="brand" href="../Jednotna stranka/index.html">
      <img src="../Jednotna stranka/graphics/sai-mark.svg" alt="" width="36" height="36">
      <span>Knihovna nástrojů</span>
    </a>
    <nav aria-label="Knihovna">
      <a href="../Jednotna stranka/index.html">Portál</a>
      <a href="../../Nastroje do hodin/Casova osa historie/casova-osa-historie.html">Časová osa</a>
    </nav>
  </header>

  <main class="classroom-shell">
    <aside class="sidebar" aria-label="Předměty">
      <div id="subject-list"></div>
    </aside>

    <section class="content" aria-labelledby="library-title">
      <div class="hero-strip">
        <div>
          <p class="eyebrow">Školní učebny</p>
          <h1 id="library-title">Moje předměty</h1>
        </div>
        <input id="tool-search" type="search" placeholder="Hledat předmět nebo nástroj">
      </div>

      <div class="view-tools">
        <button class="back-to-subjects" id="back-to-subjects" type="button">Všechny předměty</button>
        <h2 id="subject-title"></h2>
      </div>

      <div class="class-grid" id="class-grid">
        <!-- Cards are rendered from script.js so subjects and tools stay in one data source. -->
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
